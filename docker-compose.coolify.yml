# Pre-built images pushed to GHCR from local build.
# Build & push locally:
#   docker build -f server/Dockerfile -t ghcr.io/david-glitc/driftlands-server:latest .
#   docker build -f client/Dockerfile -t ghcr.io/david-glitc/driftlands-client:latest \
#     --build-arg NEXT_PUBLIC_API_URL=https://driftlands-api.kierkegaard.space \
#     --build-arg NEXT_PUBLIC_WS_URL=wss://driftlands-api.kierkegaard.space/ws \
#     --build-arg NEXT_PUBLIC_DEMO_MODE=true \
#     --build-arg NEXT_PUBLIC_DYNAMIC_ENVIRONMENT_ID=d388d3b0-2620-4ef0-8c09-3ace6d0ebbf6 \
#     .
#   docker push ghcr.io/david-glitc/driftlands-server:latest
#   docker push ghcr.io/david-glitc/driftlands-client:latest

services:
  server:
    image: ghcr.io/david-glitc/driftlands-server:latest
    restart: unless-stopped
    environment:
      PORT: "4000"
      DEMO_MODE: "true"
      DATABASE_URL: file:/data/driftlands.db
      CORS_ORIGIN: https://driftlands.kierkegaard.space
      JOURNEY_SIGNING_SECRET: change-me-in-coolify
      ABLY_API_KEY: ""
      REDIS_URL: ""
    volumes:
      - driftlands-data:/data
    expose:
      - "4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 40s

  client:
    image: ghcr.io/david-glitc/driftlands-client:latest
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    expose:
      - "3000"
    environment:
      PORT: "3000"
      HOSTNAME: 0.0.0.0

volumes:
  driftlands-data:
